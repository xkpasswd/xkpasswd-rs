name: Staging deployment

on: [pull_request]

jobs:
  deploy:
    name: Deploy Preview
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          lfs: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: www/package-lock.json

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install wasm-pack
        run: cargo binstall wasm-pack --version 0.14.0 --no-confirm --force

      - name: Install and Build
        run: |
          cd www
          npm ci
          npm run build

      - name: Deploy to Netlify
        id: netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          npm install -g netlify-cli
          
          # Debug: Get the actual site ID from sites:list
          echo "Fetching site info..."
          SITE_INFO=$(netlify sites:list --auth="$NETLIFY_AUTH_TOKEN" --json | jq -r '.[] | select(.name == "xkpasswd")')
          ACTUAL_SITE_ID=$(echo "$SITE_INFO" | jq -r '.id')
          SITE_URL=$(echo "$SITE_INFO" | jq -r '.ssl_url // .url')
          
          echo "Found site: xkpasswd"
          echo "Site ID: $ACTUAL_SITE_ID"
          echo "Site URL: $SITE_URL"
          echo "Secret site ID: $NETLIFY_SITE_ID"
          echo ""
          
          # Use the actual site ID from the API
          DEPLOY_SITE="$ACTUAL_SITE_ID"
          if [ -z "$DEPLOY_SITE" ] || [ "$DEPLOY_SITE" = "null" ]; then
            echo "Could not find site, falling back to secret"
            DEPLOY_SITE="$NETLIFY_SITE_ID"
          fi
          
          echo "Deploying to: $DEPLOY_SITE"
          
          # Deploy with error handling
          OUTPUT=$(netlify deploy \
            --dir=www/dist \
            --site="$DEPLOY_SITE" \
            --auth="$NETLIFY_AUTH_TOKEN" \
            --message="PR #${{ github.event.number }}: ${{ github.event.pull_request.title }}" \
            --json 2>&1) || true
          
          echo "Deploy output: $OUTPUT"
          
          # Extract deploy URL
          DEPLOY_URL=$(echo "$OUTPUT" | jq -r '.deploy_url // empty' 2>/dev/null)
          if [ -z "$DEPLOY_URL" ]; then
            echo "Warning: Could not extract deploy URL, deployment may have failed"
            DEPLOY_URL="$SITE_URL"
          fi
          
          echo "deploy_url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "Preview URL: $DEPLOY_URL"
        timeout-minutes: 5

      - name: Comment PR with preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const deployUrl = '${{ steps.netlify.outputs.deploy_url }}';
            const body = `## 🚀 Deploy Preview Ready!\n\n**Preview URL:** ${deployUrl}\n\n_Built from commit ${{ github.event.pull_request.head.sha }}_`;
            
            // Find existing bot comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const botComment = comments.find(c => 
              c.user.type === 'Bot' && c.body.includes('Deploy Preview Ready')
            );
            
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }
